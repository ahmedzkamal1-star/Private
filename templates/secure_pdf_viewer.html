{% extends "base.html" %}

{% block title %}عرض الملف - {{ filename }}{% endblock %}

{% block content %}
<style>
    .pdf-viewer-container {
        position: relative;
        width: 100%;
        max-width: 1000px;
        margin: 0 auto;
        background: #333;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        user-select: none;
        -webkit-user-select: none;
    }

    #pdf-render-area {
        position: relative;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        background: #222;
        padding: 20px 0;
    }

    canvas {
        margin-bottom: 20px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        max-width: 100%;
        height: auto !important;
        background: white;
    }

    /* Anti-Screenshot & Watermark Overlay */
    .security-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 10;
        overflow: hidden;
    }

    .watermark-text {
        position: absolute;
        font-size: 20px;
        font-weight: 900;
        color: rgba(212, 175, 55, 0.15);
        /* Gold watermark */
        white-space: nowrap;
        transform: rotate(-45deg);
        display: flex;
        flex-wrap: wrap;
        width: 200%;
        height: 200%;
        top: -50%;
        left: -50%;
        align-content: space-around;
        justify-content: space-around;
        pointer-events: none;
    }

    /* Anti-Photo Capture (Dynamic noise/pattern) */
    .photo-shield {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(0, 180, 216, 0.05) 2px, rgba(0, 180, 216, 0.05) 4px);
        z-index: 11;
        pointer-events: none;
    }

    .viewer-controls {
        position: sticky;
        top: 0;
        background: var(--glass-bg);
        backdrop-filter: blur(15px);
        padding: 15px;
        display: flex;
        justify-content: center;
        gap: 20px;
        z-index: 100;
        border-bottom: 1px solid var(--border-color);
    }

    .quality-badge {
        position: absolute;
        top: 10px;
        right: 10px;
        background: #10b981;
        color: white;
        padding: 4px 12px;
        border-radius: 50px;
        font-size: 0.75rem;
        font-weight: 800;
        z-index: 150;
    }
</style>

<div class="pdf-viewer-container animate-fade-in">
    <div class="quality-badge"><i class="fas fa-check-circle"></i> عرض فائق الوضوح (HD)</div>

    <div class="viewer-controls">
        <button class="premium-btn" onclick="prevPage()" id="prev-btn" style="padding: 10px 20px; font-size: 0.9rem;">
            <i class="fas fa-chevron-right"></i> السابق
        </button>
        <span style="display: flex; align-items: center; font-weight: 900; color: var(--text-primary);">
            صفحة <span id="page-num" style="margin: 0 5px; color: var(--sky-primary);">1</span> من <span id="page-count"
                style="margin: 0 5px;">...</span>
        </span>
        <button class="premium-btn" onclick="nextPage()" id="next-btn" style="padding: 10px 20px; font-size: 0.9rem;">
            التالي <i class="fas fa-chevron-left"></i>
        </button>
    </div>

    <div id="pdf-render-area">
        <div class="security-overlay">
            <div class="watermark-text" id="watermark-container"></div>
            <div class="photo-shield"></div>
        </div>
        <canvas id="the-canvas"></canvas>
    </div>
</div>

<!-- Load PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
    const url = "{{ url_for('main.uploaded_file', filename=filename) }}";
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let pdfDoc = null,
        pageNum = 1,
        pageRendering = false,
        pageNumPending = null,
        scale = 2.0, // HIGHER SCALE FOR CRISP TEXT
        canvas = document.getElementById('the-canvas'),
        ctx = canvas.getContext('2d');

    // Watermark Initialization
    const studentInfo = "{{ current_user.full_name }} | {{ current_user.student_code or 'ID' }}";
    const watermarkContainer = document.getElementById('watermark-container');
    for (let i = 0; i < 40; i++) {
        const span = document.createElement('span');
        span.textContent = studentInfo;
        watermarkContainer.appendChild(span);
    }

    /**
     * Get page info from document, resize canvas accordingly, and render page.
     */
    function renderPage(num) {
        pageRendering = true;
        pdfDoc.getPage(num).then(function (page) {
            const viewport = page.getViewport({ scale: scale });

            // Adjust canvas for High DPI
            const outputScale = window.devicePixelRatio || 1;
            canvas.width = Math.floor(viewport.width * outputScale);
            canvas.height = Math.floor(viewport.height * outputScale);
            canvas.style.width = Math.floor(viewport.width) + "px";
            canvas.style.height = Math.floor(viewport.height) + "px";

            const transform = outputScale !== 1
                ? [outputScale, 0, 0, outputScale, 0, 0]
                : null;

            const renderContext = {
                canvasContext: ctx,
                transform: transform,
                viewport: viewport
            };
            const renderTask = page.render(renderContext);

            renderTask.promise.then(function () {
                pageRendering = false;
                if (pageNumPending !== null) {
                    renderPage(pageNumPending);
                    pageNumPending = null;
                }
            });
        });

        document.getElementById('page-num').textContent = num;
    }

    function queueRenderPage(num) {
        if (pageRendering) {
            pageNumPending = num;
        } else {
            renderPage(num);
        }
    }

    function prevPage() {
        if (pageNum <= 1) return;
        pageNum--;
        queueRenderPage(pageNum);
    }

    function nextPage() {
        if (pageNum >= pdfDoc.numPages) return;
        pageNum++;
        queueRenderPage(pageNum);
    }

    // Initial Load
    pdfjsLib.getDocument(url).promise.then(function (pdfDoc_) {
        pdfDoc = pdfDoc_;
        document.getElementById('page-count').textContent = pdfDoc.numPages;
        renderPage(pageNum);
    });

    // Anti-Screenshot Protection
    document.addEventListener('contextmenu', e => e.preventDefault());

    // Periodically scramble watermark to make stitching harder
    setInterval(() => {
        watermarkContainer.style.opacity = Math.random() * 0.1 + 0.1;
    }, 2000);

    // Detect print attempt
    window.onbeforeprint = () => {
        document.body.innerHTML = "<h1>الطباعة معطلة لحماية المحتوى 🛡️</h1>";
    };
</script>
{% endblock %}
