{% extends "base.html" %}

{% block title %}عرض الملف - Al-dahih{% endblock %}

{% block content %}
<div class="main-container-v2 animate-slide-up">
    <div class="section-header-v2">
        <h3><i class="fas fa-file-pdf" style="color: var(--sky-primary); margin-left: 10px;"></i> المكتبة الرقمية</h3>
        <div style="display: flex; gap: 10px; align-items: center;">
            <a href="javascript:history.back()" class="premium-btn"
                style="padding: 8px 15px; font-size: 0.85rem; background: var(--hover-bg); color: var(--text-secondary); border: 1px solid var(--border-color); box-shadow: none; text-decoration: none;">
                <i class="fas fa-arrow-right" style="margin-left: 8px;"></i> العودة
            </a>
        </div>
    </div>

    <div class="card pdf-viewer-container"
        style="position: relative; overflow: hidden; padding: 0; border-radius: 25px; background: #1a1a2e; border: 1px solid var(--border-color); box-shadow: var(--card-shadow); min-height: 80vh; user-select: none; -webkit-user-select: none;">

        <!-- Watermark Overlay with Student Name -->
        <div id="watermarkOverlay"
            style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; overflow: hidden;">
            <div id="watermarkGrid"
                style="position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; transform: rotate(-30deg); display: flex; flex-wrap: wrap; align-content: space-around; justify-content: space-around;">
            </div>
        </div>

        <div id="pdf-viewer-wrapper" style="overflow-y: auto; height: 80vh; padding: 40px 0; position: relative;">
            <canvas id="pdf-canvas"
                style="display: block; margin: 0 auto; box-shadow: 0 10px 50px rgba(0,0,0,0.5); max-width: 95%; transition: transform 0.2s ease; border-radius: 8px;"></canvas>
        </div>

        <!-- Zoom Controls -->
        <div
            style="position: absolute; top: 30px; right: 30px; display: flex; flex-direction: column; gap: 15px; z-index: 102;">
            <button onclick="zoom(0.2)" class="premium-btn"
                style="width: 50px; height: 50px; padding: 0; justify-content: center; border-radius: 15px; background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid var(--border-color);">
                <i class="fas fa-search-plus"></i>
            </button>
            <button onclick="zoom(-0.2)" class="premium-btn"
                style="width: 50px; height: 50px; padding: 0; justify-content: center; border-radius: 15px; background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid var(--border-color);">
                <i class="fas fa-search-minus"></i>
            </button>
            <button onclick="resetZoom()" class="premium-btn"
                style="width: 50px; height: 50px; padding: 0; justify-content: center; border-radius: 15px; background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid var(--border-color);">
                <i class="fas fa-undo"></i>
            </button>
        </div>

        <!-- Page Controls -->
        <div class="pdf-controls"
            style="position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--glass-bg); backdrop-filter: blur(20px); padding: 12px 30px; border-radius: 20px; display: flex; justify-content: center; gap: 25px; align-items: center; z-index: 101; border: 1px solid var(--border-color); box-shadow: 0 10px 30px rgba(0,0,0,0.3);">
            <button onclick="changePage(-1)" class="premium-btn"
                style="padding: 8px 20px; font-size: 0.85rem; background: transparent; border: 1px solid var(--border-color);">السابق</button>
            <span id="page-info" style="font-weight: 800; color: white; font-family: 'Outfit'; font-size: 0.9rem;">
                صفحة <span id="page-num" style="color: var(--sky-primary);">1</span> / <span id="page-count">?</span>
            </span>
            <button onclick="changePage(1)" class="premium-btn"
                style="padding: 8px 20px; font-size: 0.85rem; background: var(--sky-primary); border: none;">التالي</button>
        </div>
    </div>
</div>

<style>
    #pdf-viewer-wrapper::-webkit-scrollbar {
        width: 8px;
    }

    #pdf-viewer-wrapper::-webkit-scrollbar-thumb {
        background: var(--accent-color);
        border-radius: 10px;
    }

    /* Screenshot Warning Overlay */
    .screenshot-warning-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.95);
        z-index: 99999;
        display: none;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        gap: 20px;
    }

    .screenshot-warning-overlay.active {
        display: flex;
    }

    .screenshot-warning-overlay .sw-icon {
        font-size: 5rem;
        color: #ef4444;
        animation: pulseW 1s infinite;
    }

    .screenshot-warning-overlay .sw-text {
        color: white;
        font-size: 1.8rem;
        font-weight: 900;
        text-align: center;
    }

    .screenshot-warning-overlay .sw-sub {
        color: rgba(255, 255, 255, 0.6);
        font-size: 1rem;
        text-align: center;
    }

    @keyframes pulseW {

        0%,
        100% {
            transform: scale(1);
        }

        50% {
            transform: scale(1.2);
        }
    }

    .screenshot-toast {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%) translateY(-100px);
        background: linear-gradient(135deg, #ef4444, #dc2626);
        color: white;
        padding: 15px 30px;
        border-radius: 15px;
        font-weight: 800;
        font-size: 1rem;
        z-index: 100000;
        box-shadow: 0 10px 30px rgba(239, 68, 68, 0.4);
        transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .screenshot-toast.show {
        transform: translateX(-50%) translateY(0);
    }
</style>

<!-- Screenshot Warning Elements -->
<div class="screenshot-warning-overlay" id="screenshotWarning">
    <div class="sw-icon"><i class="fas fa-shield-alt"></i></div>
    <div class="sw-text">⚠️ يعتذر عن التصوير</div>
    <div class="sw-sub">المحتوى محمي - لا يمكن تصوير هذه الصفحة 🛡️</div>
</div>
<div class="screenshot-toast" id="screenshotToast">
    <i class="fas fa-ban"></i>
    <span>⛔ ماينفعش تصور! المحتوى محمي</span>
</div>

<!-- PDF.js library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

<script>
    // === Watermark Setup ===
    (function () {
        const studentName = "{{ current_user.full_name if current_user.is_authenticated else '' }}";
        const studentCode = "{{ current_user.code if current_user.is_authenticated else '' }}";
        const watermarkText = studentName + ' | ' + studentCode;
        const grid = document.getElementById('watermarkGrid');

        for (let i = 0; i < 50; i++) {
            const span = document.createElement('span');
            span.textContent = watermarkText;
            span.style.cssText = 'font-size: 18px; font-weight: 900; color: rgba(212,175,55,0.12); white-space: nowrap; padding: 30px 50px;';
            grid.appendChild(span);
        }

        // Slight animation to make stitching harder
        setInterval(() => {
            grid.style.opacity = (Math.random() * 0.08 + 0.08).toFixed(2);
        }, 2500);
    })();

    // === PDF Viewer ===
    const url = "{{ url_for('static', filename='uploads/' + filename) }}";
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let pdfDoc = null, pageNum = 1, pageIsRendering = false, pageNumIsPending = null;
    const getQualityScale = () => { const dpr = window.devicePixelRatio || 1; return 2.0 * dpr; };
    const canvas = document.getElementById('pdf-canvas'), ctx = canvas.getContext('2d', { alpha: false });

    const renderPage = num => {
        pageIsRendering = true;
        pdfDoc.getPage(num).then(page => {
            const viewport = page.getViewport({ scale: getQualityScale() });
            canvas.height = viewport.height; canvas.width = viewport.width;
            canvas.style.width = '100%'; canvas.style.height = 'auto';
            page.render({ canvasContext: ctx, viewport, intent: 'display' }).promise.then(() => {
                pageIsRendering = false;
                if (pageNumIsPending !== null) { renderPage(pageNumIsPending); pageNumIsPending = null; }
            });
            document.getElementById('page-num').textContent = num;
        });
    };
    const queueRenderPage = num => { if (pageIsRendering) { pageNumIsPending = num; } else { renderPage(num); } };
    const changePage = offset => {
        if (pageNum + offset <= 0 || pageNum + offset > pdfDoc.numPages) return;
        pageNum += offset; queueRenderPage(pageNum);
    };
    pdfjsLib.getDocument(url).promise.then(pdfDoc_ => {
        pdfDoc = pdfDoc_;
        document.getElementById('page-count').textContent = pdfDoc.numPages;
        renderPage(pageNum);
    }).catch(err => {
        document.getElementById('pdf-viewer-wrapper').innerHTML =
            '<div style="text-align:center; padding: 4rem; color: white;">' +
            '<i class="fas fa-exclamation-triangle" style="font-size: 3rem; color: #f59e0b; display: block; margin-bottom: 1rem;"></i>' +
            '<p style="font-size: 1.1rem;">تعذر عرض الملف. <br><a href="' + url + '" target="_blank" style="color: #63b3ed; font-weight: 800;">اضغط هنا لتحميله</a></p></div>';
    });

    let currentZoom = 1;
    const zoom = (delta) => { currentZoom = Math.max(0.5, Math.min(3, currentZoom + delta)); canvas.style.transform = `scale(${currentZoom})`; canvas.style.transformOrigin = 'top center'; };
    const resetZoom = () => { currentZoom = 1; canvas.style.transform = 'scale(1)'; };

    // === Screenshot Prevention ===
    (function () {
        const warning = document.getElementById('screenshotWarning');
        const toast = document.getElementById('screenshotToast');
        let wt;
        function showWarn() {
            warning.classList.add('active'); toast.classList.add('show');
            clearTimeout(wt);
            wt = setTimeout(() => { warning.classList.remove('active'); toast.classList.remove('show'); }, 3000);
        }
        document.addEventListener('keyup', function (e) {
            if (e.key === 'PrintScreen' || e.keyCode === 44) { e.preventDefault(); navigator.clipboard.writeText('').catch(() => { }); showWarn(); }
        });
        document.addEventListener('keydown', function (e) {
            if (e.key === 'PrintScreen' || e.keyCode === 44) { e.preventDefault(); showWarn(); return false; }
            if ((e.ctrlKey || e.metaKey) && (e.key === 'p' || e.key === 'P' || e.key === 's' || e.key === 'S')) { e.preventDefault(); showWarn(); return false; }
            if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'i' || e.key === 'I')) { e.preventDefault(); return false; }
        });
        document.addEventListener('contextmenu', function (e) { e.preventDefault(); showWarn(); return false; });
        window.onbeforeprint = function () { document.body.innerHTML = "<h1 style='text-align:center; padding:5rem; color:#ef4444;'>⛔ الطباعة معطلة لحماية المحتوى</h1>"; };
    })();
</script>
{% endblock %}
