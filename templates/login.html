<!DOCTYPE html>
<html lang="ar" dir="rtl" data-ramadan="enabled">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - منصة الدحيح</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=54.0">
    <link rel="icon" href="{{ url_for('static', filename='images/logo.png') }}" type="image/png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0A1128">
    <style>
        /* Login-specific overrides */
        body.login-page {
            background: #0A1128 !important;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Animated particles */
        .login-particles {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .particle-dot {
            position: absolute;
            background: rgba(212, 175, 55, 0.3);
            border-radius: 50%;
            animation: floatUp var(--speed) linear infinite;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateY(-10vh) scale(1);
                opacity: 0;
            }
        }

        /* Floating orbs behind login */
        .login-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
            animation: orbDrift 25s ease-in-out infinite alternate;
        }

        .login-orb-1 {
            width: 500px;
            height: 500px;
            background: #D4AF37;
            top: -20%;
            right: -15%;
        }

        .login-orb-2 {
            width: 400px;
            height: 400px;
            background: #1E2A44;
            bottom: -20%;
            left: -20%;
            animation-delay: 8s;
        }

        @keyframes orbDrift {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }

            100% {
                transform: translate(60px, -40px) rotate(20deg);
            }
        }

        /* Login Card - Glassmorphism */
        .login-container {
            position: relative;
            z-index: 10;
            background: rgba(10, 17, 40, 0.85);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            padding: 3rem 2.5rem;
            border-radius: 35px;
            width: 100%;
            max-width: 460px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6), 0 0 40px rgba(212, 175, 55, 0.08);
            animation: cardEntrance 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes cardEntrance {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(30px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header .logo {
            width: 180px;
            display: block;
            margin: 0 auto 1.2rem;
            filter: drop-shadow(0 8px 20px rgba(212, 175, 55, 0.3));
        }

        .login-header h2 {
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #fff8e1, #D4AF37);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-header p {
            color: rgba(240, 230, 210, 0.6);
            font-size: 0.95rem;
            font-weight: 600;
        }

        .login-form .input-group {
            position: relative;
            margin-bottom: 1.2rem;
        }

        .login-form .input-group i {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #D4AF37;
            font-size: 1rem;
            opacity: 0.6;
        }

        .login-form input {
            width: 100%;
            padding: 16px 50px 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1.5px solid rgba(212, 175, 55, 0.15);
            border-radius: 16px;
            color: #F0E6D2;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s ease;
        }

        .login-form input:focus {
            border-color: #D4AF37;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.15);
            outline: none;
            background: rgba(255, 255, 255, 0.08);
        }

        .login-form input::placeholder {
            color: rgba(240, 230, 210, 0.35);
        }

        .remember-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 1.5rem 0.2rem;
            font-size: 0.9rem;
        }

        .remember-row label {
            color: rgba(240, 230, 210, 0.6);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .remember-row a {
            color: #D4AF37;
            text-decoration: none;
            font-weight: 700;
        }

        .remember-row a:hover {
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 18px;
            background: linear-gradient(135deg, #D4AF37, #8B6B00);
            color: white;
            font-size: 1.15rem;
            font-weight: 800;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.3);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.4);
        }

        .login-footer {
            text-align: center;
            margin-top: 2rem;
            border-top: 1px solid rgba(212, 175, 55, 0.15);
            padding-top: 1.5rem;
        }

        .login-footer p {
            color: rgba(240, 230, 210, 0.5);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .login-footer a {
            color: #D4AF37;
            text-decoration: none;
            font-weight: 800;
        }

        /* Crescent decoration */
        .login-crescent {
            position: fixed;
            top: 40px;
            left: 8%;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            box-shadow: 16px 16px 0 0 #D4AF37;
            filter: drop-shadow(0 0 18px rgba(212, 175, 55, 0.6));
            opacity: 0.7;
            z-index: 1;
        }

        /* Lanterns */
        .login-lantern {
            position: fixed;
            top: 0;
            z-index: 2;
            width: 22px;
            height: 36px;
            background: #D4AF37;
            clip-path: polygon(50% 0%, 100% 20%, 100% 80%, 50% 100%, 0% 80%, 0% 20%);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            animation: swingL 3s ease-in-out infinite alternate;
            transform-origin: top center;
        }

        .login-lantern::before {
            content: '';
            position: absolute;
            top: -14px;
            left: 50%;
            width: 2px;
            height: 14px;
            background: rgba(255, 215, 0, 0.3);
            transform: translateX(-50%);
        }

        @keyframes swingL {
            0% {
                transform: rotate(-4deg);
            }

            100% {
                transform: rotate(4deg);
            }
        }

        @media (max-width: 500px) {
            .login-container {
                margin: 15px;
                padding: 2rem 1.5rem;
            }

            .login-header h2 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>

<body class="login-page">
    <!-- Animated Particles -->
    <div class="login-particles" id="particles"></div>

    <!-- Floating Orbs -->
    <div class="login-orb login-orb-1"></div>
    <div class="login-orb login-orb-2"></div>

    <!-- Crescent Moon -->
    <div class="login-crescent"></div>

    <!-- Lanterns -->
    <div class="login-lantern" style="left: 15%; animation-delay: 0s;"></div>
    <div class="login-lantern" style="left: 40%; animation-delay: 0.7s;"></div>
    <div class="login-lantern" style="right: 40%; animation-delay: 1.1s;"></div>
    <div class="login-lantern" style="right: 15%; animation-delay: 0.4s;"></div>

    <!-- Login Card -->
    <div class="login-container">
        <!-- Back to Home -->
        <a href="{{ url_for('main.index') }}"
            style="position: absolute; top: 20px; right: 25px; color: rgba(240, 230, 210, 0.6); text-decoration: none; font-size: 0.95rem; font-weight: 600; transition: 0.3s; z-index: 20;"
            onmouseover="this.style.color='#D4AF37'" onmouseout="this.style.color='rgba(240, 230, 210, 0.6)'">
            <i class="fas fa-arrow-right" style="margin-left: 5px;"></i> العودة للرئيسية
        </a>

        <div class="login-header" style="margin-top: 20px;">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="شعار المنصة" class="logo">
            <h2>تسجيل الدخول</h2>
            <p>أهلاً بك مجدداً! يرجى إدخال بياناتك</p>
        </div>

        <div class="flash-messages-login" style="margin-bottom: 1rem;">
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div
                style="padding: 12px; border-radius: 14px; background: rgba(212,175,55,0.1); color: #D4AF37; font-size: 0.9rem; font-weight: 700; margin-bottom: 8px; border: 1px solid rgba(212,175,55,0.2);">
                <i class="fas fa-info-circle" style="margin-left: 6px;"></i> {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}
        </div>

        <form class="login-form" method="POST" action="{{ url_for('main.login') }}">
            <div class="input-group">
                <i class="fas fa-id-card"></i>
                <input type="text" name="code" placeholder="كود الطالب" required autocomplete="off">
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" placeholder="كلمة المرور" required>
            </div>

            <div class="remember-row">
                <label>
                    <input type="checkbox" name="remember" style="width: 16px; height: 16px; accent-color: #D4AF37;">
                    تذكرني
                </label>
                <a href="#">نسيت كلمة المرور؟</a>
            </div>

            <button type="submit" class="login-btn">
                دخول المنصة <i class="fas fa-arrow-left"></i>
            </button>
        </form>

        <div class="login-footer">
            <p>ليس لديك حساب؟ <a href="{{ url_for('main.register') }}">إنشاء حساب</a></p>
        </div>
    </div>

    <script>
        // Generate floating particles
        const container = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const dot = document.createElement('div');
            dot.className = 'particle-dot';
            const size = Math.random() * 4 + 2;
            dot.style.width = size + 'px';
            dot.style.height = size + 'px';
            dot.style.left = Math.random() * 100 + '%';
            dot.style.setProperty('--speed', (Math.random() * 8 + 6) + 's');
            dot.style.animationDelay = Math.random() * 10 + 's';
            container.appendChild(dot);
        }
    </script>
</body>

</html>
