<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - منصة الدحيح</title>
    <!-- Google Cairo Font -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=20.0">
</head>

<body class="login-page">
    <!-- Premium Mesh Background -->
    <div class="mesh-background">
        <div class="mesh-blob blob-1"></div>
        <div class="mesh-blob blob-2"></div>
        <div class="mesh-blob blob-3"></div>
    </div>

    <div class="login-container">
        <div class="login-header">
            <!-- الشعار -->
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="شعار المنصة" class="logo"
                style="width: 120px; margin-bottom: 1rem; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));">
            <h2>تسجيل الدخول</h2>
            <p>أهلاً بك مجدداً! يرجى إدخال بياناتك</p>
        </div>

        <div class="flash-messages-login" style="margin-bottom: 1.5rem;">
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }}"
                style="padding: 12px; border-radius: 12px; background: rgba(255,0,0,0.1); color: #ef4444; font-size: 0.9rem; font-weight: 700; margin-bottom: 10px; border: 1px solid rgba(239, 68, 68, 0.2);">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}
        </div>

        <form class="login-form" method="POST" action="{{ url_for('main.login') }}">
            <!-- في مشروعك يستخدم كود الطالب (Code) -->
            <div class="input-group">
                <input type="text" name="code" placeholder="الكود الجامعي الخاص بك" required autocomplete="off">
            </div>

            <div class="input-group">
                <input type="password" name="password" placeholder="كلمة المرور" required>
            </div>

            <div
                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; font-size: 0.9rem;">
                <label style="color: var(--sky-dark); cursor: pointer; display: flex; align-items: center; gap: 5px;">
                    <input type="checkbox" name="remember" style="width: auto; margin-bottom: 0;"> تذكرني
                </label>
                <a href="#" style="color: var(--sky-primary); text-decoration: none; font-weight: 700;">نسيت كلمة
                    المرور؟</a>
            </div>

            <button type="submit" class="login-btn">دخول المنصة</button>
        </form>

        <div style="text-align: center; margin-top: 2rem; border-top: 1px solid #eee; padding-top: 1.5rem;">
            <p style="color: #666; font-size: 0.95rem;">ليس لديك حساب؟ <a href="{{ url_for('main.register') }}"
                    style="color: var(--sky-primary); text-decoration: none; font-weight: 900;">إنشاء حساب جديد</a></p>
        </div>
    </div>
</body>

</html>
