{% extends "base.html" %}

{% block title %}تسجيل الدخول - Al-dahih{% endblock %}

{% block content %}
<div class="premium-login-context">
    <!-- Animated Mesh Background -->
    <div class="mesh-background">
        <div class="mesh-blob blob-1"></div>
        <div class="mesh-blob blob-2"></div>
        <div class="mesh-blob blob-3"></div>
    </div>

    <div class="login-wrapper animate-slide-up">
        <div class="login-glass-card-v3">
            <div class="login-brand">
                <div class="logo-box">
                    <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo">
                </div>
                <h2>أهلاً بك يا دحيح!</h2>
                <p>سجل دخولك لتستكمل رحلة التفوق</p>
            </div>

            <form method="POST" action="{{ url_for('main.login') }}" class="modern-form">
                <div class="form-group-v3">
                    <label>الكود الجامعي</label>
                    <div class="input-focus-group">
                        <i class="fas fa-fingerprint"></i>
                        <input type="text" name="code" placeholder="أدخل كود الطالب" required autofocus>
                    </div>
                </div>

                <div class="form-group-v3">
                    <label>كلمة المرور</label>
                    <div class="input-focus-group">
                        <i class="fas fa-shield-alt"></i>
                        <input type="password" name="password" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="form-actions-v3">
                    <div class="remember-me">
                        <input type="checkbox" id="remember" name="remember">
                        <label for="remember">تذكرني</label>
                    </div>
                    <a href="#" class="forgot-link">نسيت كلمة المرور؟</a>
                </div>

                <button type="submit" class="premium-btn">
                    <span>دخول المنصة</span>
                    <i class="fas fa-rocket"></i>
                </button>

                <div class="register-hint">
                    ليس لديك حساب؟ <a href="{{ url_for('main.register') }}">انضم إلينا الآن</a>
                </div>
            </form>
        </div>

        <!-- Bottom Decoration -->
        <div class="login-footer-tags">
            <span>حقوق المحتوى محفوظة © 2026</span>
            <span>•</span>
            <span>منصة الدحيح التعليمية</span>
        </div>
    </div>
</div>

<style>
    :root {
        --p-primary: #6366f1;
        --p-secondary: #a855f7;
        --p-accent: #ec4899;
        --p-glass: rgba(255, 255, 255, 0.7);
        --p-border: rgba(255, 255, 255, 0.3);
    }

    .premium-login-context {
        min-height: calc(100vh - 80px);
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
        background: #f8fafc;
        padding: 20px;
    }

    /* Mesh Background Animation */
    .mesh-background {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        filter: blur(80px);
        opacity: 0.6;
    }

    .mesh-blob {
        position: absolute;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--p-primary), var(--p-secondary));
        animation: float-mesh 20s infinite alternate;
    }

    .blob-1 {
        width: 500px;
        height: 500px;
        top: -100px;
        right: -100px;
        background: #818cf8;
    }

    .blob-2 {
        width: 400px;
        height: 400px;
        bottom: -50px;
        left: -100px;
        background: #c084fc;
        animation-delay: -5s;
    }

    .blob-3 {
        width: 300px;
        height: 300px;
        top: 40%;
        left: 30%;
        background: #f472b6;
        animation-delay: -10s;
    }

    @keyframes float-mesh {
        0% {
            transform: translate(0, 0) scale(1);
        }

        100% {
            transform: translate(50px, 100px) scale(1.2);
        }
    }

    /* Login Card */
    .login-wrapper {
        width: 100%;
        max-width: 480px;
        z-index: 10;
        position: relative;
    }

    .login-glass-card-v3 {
        background: var(--p-glass);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--p-border);
        border-radius: 32px;
        padding: 45px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
    }

    .login-brand {
        text-align: center;
        margin-bottom: 35px;
    }

    .logo-box {
        width: 80px;
        height: 80px;
        background: white;
        border-radius: 20px;
        margin: 0 auto 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
        transform: rotate(-5deg);
        transition: 0.5s;
    }

    .logo-box:hover {
        transform: rotate(0deg) scale(1.1);
    }

    .logo-box img {
        width: 55px;
    }

    .login-brand h2 {
        font-size: 1.8rem;
        font-weight: 800;
        color: #1e293b;
        margin-bottom: 8px;
    }

    .login-brand p {
        color: #64748b;
        font-size: 0.95rem;
    }

    /* Form Styles */
    .modern-form {
        display: flex;
        flex-direction: column;
        gap: 24px;
    }

    .form-group-v3 label {
        display: block;
        font-weight: 700;
        color: #334155;
        margin-bottom: 10px;
        font-size: 0.9rem;
        margin-right: 5px;
    }

    .input-focus-group {
        position: relative;
        display: flex;
        align-items: center;
    }

    .input-focus-group i {
        position: absolute;
        right: 18px;
        color: #94a3b8;
        font-size: 1.1rem;
        transition: 0.3s;
    }

    .input-focus-group input {
        width: 100%;
        padding: 16px 50px 16px 18px;
        background: rgba(255, 255, 255, 0.8);
        border: 2px solid transparent;
        border-radius: 18px;
        font-size: 1rem;
        color: #1e293b;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        outline: none;
    }

    .input-focus-group input:focus {
        background: white;
        border-color: var(--p-primary);
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }

    .input-focus-group input:focus+i {
        color: var(--p-primary);
        transform: scale(1.2);
    }

    /* Actions */
    .form-actions-v3 {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 5px;
    }

    .remember-me {
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
    }

    .remember-me label {
        font-size: 0.85rem;
        color: #64748b;
        cursor: pointer;
    }

    .remember-me input {
        cursor: pointer;
        width: 16px;
        height: 16px;
        accent-color: var(--p-primary);
    }

    .forgot-link {
        font-size: 0.85rem;
        color: var(--p-primary);
        text-decoration: none;
        font-weight: 600;
    }

    /* Button */
    .premium-btn {
        background: linear-gradient(135deg, var(--p-primary), var(--p-secondary));
        color: white;
        padding: 18px;
        border: none;
        border-radius: 18px;
        font-size: 1.1rem;
        font-weight: 800;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        transition: all 0.3s;
        box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
    }

    .premium-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 30px rgba(99, 102, 241, 0.4);
        filter: brightness(1.1);
    }

    .premium-btn:active {
        transform: translateY(0);
    }

    .register-hint {
        text-align: center;
        margin-top: 10px;
        font-size: 0.9rem;
        color: #64748b;
    }

    .register-hint a {
        color: var(--p-primary);
        text-decoration: none;
        font-weight: 800;
    }

    .login-footer-tags {
        margin-top: 30px;
        display: flex;
        justify-content: center;
        gap: 15px;
        color: #94a3b8;
        font-size: 0.8rem;
    }

    @media (max-width: 500px) {
        .login-glass-card-v3 {
            padding: 35px 25px;
            border-radius: 0;
            height: 100vh;
            max-width: none;
            background: white;
            border: none;
        }

        .premium-login-context {
            padding: 0;
            background: white;
        }

        .mesh-background {
            display: none;
        }
    }
</style>
{% endblock %}
