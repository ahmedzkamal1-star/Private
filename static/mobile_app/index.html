<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0e27">
    <title>الدحيح - El Dahih</title>
    <link rel="manifest" href="/manifest.json">
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/mobile_app/styles.css">
</head>

<body>
    <!-- Splash Screen -->
    <div id="splash-screen" class="splash-screen">
        <div class="splash-content">
            <div class="splash-logo">
                <div class="splash-icon">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <h1 class="splash-title">الدحيح</h1>
                <p class="splash-subtitle">El-Dahih Educational Platform</p>
            </div>
            <div class="splash-loader">
                <div class="loader-bar"></div>
            </div>
        </div>
    </div>

    <!-- App Container -->
    <div id="app" class="app-container" style="display:none;">

        <!-- ============ LOGIN SCREEN ============ -->
        <div id="screen-login" class="screen active">
            <div class="login-bg">
                <div class="login-particles">
                    <div class="particle"></div>
                    <div class="particle"></div>
                    <div class="particle"></div>
                    <div class="particle"></div>
                    <div class="particle"></div>
                    <div class="particle"></div>
                </div>
                <div class="login-card">
                    <div class="login-logo">
                        <div class="logo-circle">
                            <i class="fas fa-graduation-cap"></i>
                        </div>
                        <h1 data-i18n="login_title">تسجيل الدخول</h1>
                        <p data-i18n="login_subtitle">أدخل بياناتك للوصول للمنصة</p>
                    </div>
                    <form id="login-form" onsubmit="return false;">
                        <div class="input-group">
                            <i class="fas fa-id-card"></i>
                            <input type="text" id="login-code" data-i18n-placeholder="student_code"
                                placeholder="الكود الجامعي" required autocomplete="username">
                        </div>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="login-password" data-i18n-placeholder="password"
                                placeholder="كلمة المرور" required autocomplete="current-password">
                            <button type="button" class="toggle-pass" onclick="togglePassword('login-password', this)">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <button type="submit" class="btn-primary btn-glow" id="login-btn" onclick="doLogin()">
                            <span data-i18n="login_btn">الدخول الآن</span>
                            <i class="fas fa-arrow-left"></i>
                        </button>
                    </form>
                    <div class="login-footer">
                        <a href="#" onclick="showScreen('screen-register')" data-i18n="no_account">ليس لديك حساب؟ سجل
                            الآن</a>
                    </div>
                </div>
            </div>
        </div>

        <!-- ============ REGISTER SCREEN ============ -->
        <div id="screen-register" class="screen">
            <div class="login-bg">
                <div class="login-card register-card">
                    <div class="login-logo">
                        <div class="logo-circle small">
                            <i class="fas fa-user-plus"></i>
                        </div>
                        <h1 data-i18n="register_title">تسجيل حساب جديد</h1>
                    </div>
                    <form id="register-form" onsubmit="return false;">
                        <div class="input-group">
                            <i class="fas fa-id-card"></i>
                            <input type="text" id="reg-code" placeholder="الكود الجامعي" required>
                        </div>
                        <div class="input-group">
                            <i class="fas fa-user"></i>
                            <input type="text" id="reg-name" placeholder="الاسم بالكامل" required>
                        </div>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="reg-password" placeholder="كلمة المرور" required>
                        </div>
                        <div class="input-group">
                            <i class="fas fa-phone"></i>
                            <input type="tel" id="reg-phone" placeholder="رقم الهاتف">
                        </div>
                        <div class="input-row">
                            <div class="input-group half">
                                <i class="fas fa-building"></i>
                                <select id="reg-department">
                                    <option value="">القسم</option>
                                    <option value="علمي">علمي</option>
                                    <option value="أدبي">أدبي</option>
                                    <option value="عام">عام</option>
                                </select>
                            </div>
                            <div class="input-group half">
                                <i class="fas fa-layer-group"></i>
                                <select id="reg-year">
                                    <option value="">الفرقة</option>
                                    <option value="الأولى">الأولى</option>
                                    <option value="الثانية">الثانية</option>
                                    <option value="الثالثة">الثالثة</option>
                                    <option value="الرابعة">الرابعة</option>
                                </select>
                            </div>
                        </div>
                        <div class="gender-selector">
                            <label class="gender-option active" onclick="selectGender('male', this)">
                                <i class="fas fa-mars"></i> <span data-i18n="male">ذكر</span>
                            </label>
                            <label class="gender-option" onclick="selectGender('female', this)">
                                <i class="fas fa-venus"></i> <span data-i18n="female">أنثى</span>
                            </label>
                        </div>
                        <button type="submit" class="btn-primary btn-glow" onclick="doRegister()">
                            <span data-i18n="register_btn">تسجيل الحساب</span>
                            <i class="fas fa-check"></i>
                        </button>
                    </form>
                    <div class="login-footer">
                        <a href="#" onclick="showScreen('screen-login')" data-i18n="have_account">لديك حساب؟ سجل
                            دخول</a>
                    </div>
                </div>
            </div>
        </div>

        <!-- ============ MAIN APP (Post-Login) ============ -->
        <div id="screen-main" class="screen">
            <!-- Top Header Bar -->
            <header class="app-header">
                <div class="header-content">
                    <div class="header-right">
                        <div class="user-avatar" onclick="showScreen('screen-profile')">
                            <i class="fas fa-user"></i>
                        </div>
                        <div class="header-info">
                            <h3 id="header-name">مرحباً</h3>
                            <span id="header-points" class="points-badge">
                                <i class="fas fa-star"></i> <span>0</span> نقطة
                            </span>
                        </div>
                    </div>
                    <div class="header-left">
                        <button class="icon-btn" onclick="toggleTheme()" title="تبديل الثيم">
                            <i class="fas fa-moon" id="theme-icon"></i>
                        </button>
                        <button class="icon-btn" onclick="toggleLang()" title="تبديل اللغة">
                            <i class="fas fa-language"></i>
                        </button>
                    </div>
                </div>
            </header>

            <!-- Content Area -->
            <main class="main-content" id="main-content">
                <!-- Home Tab -->
                <div id="tab-home" class="tab-content active">
                    <div class="section-header">
                        <h2 data-i18n="home_title"><i class="fas fa-home"></i> الصفحة الرئيسية</h2>
                    </div>
                    <div id="posts-container" class="posts-feed">
                        <div class="skeleton-loader">
                            <div class="skeleton-card"></div>
                            <div class="skeleton-card"></div>
                        </div>
                    </div>
                </div>

                <!-- Courses Tab -->
                <div id="tab-courses" class="tab-content">
                    <div class="section-header">
                        <h2 data-i18n="courses_title"><i class="fas fa-book"></i> المواد الدراسية</h2>
                    </div>
                    <div id="courses-container" class="courses-grid">
                        <div class="skeleton-loader">
                            <div class="skeleton-card"></div>
                            <div class="skeleton-card"></div>
                        </div>
                    </div>
                </div>

                <!-- Lessons Tab (shown when clicking a course) -->
                <div id="tab-lessons" class="tab-content">
                    <div class="section-header">
                        <button class="back-btn" onclick="showTab('tab-courses')">
                            <i class="fas fa-arrow-right"></i>
                        </button>
                        <h2 id="lessons-title">الدروس</h2>
                    </div>
                    <div id="lessons-container" class="lessons-list"></div>
                </div>

                <!-- Profile Tab -->
                <div id="tab-profile" class="tab-content">
                    <div class="profile-container" id="profile-container"></div>
                </div>
            </main>

            <!-- Bottom Navigation -->
            <nav class="bottom-nav">
                <button class="nav-item active" onclick="switchTab('tab-home', this)" id="nav-home">
                    <i class="fas fa-home"></i>
                    <span data-i18n="nav_home">الرئيسية</span>
                </button>
                <button class="nav-item" onclick="switchTab('tab-courses', this)" id="nav-courses">
                    <i class="fas fa-book-open"></i>
                    <span data-i18n="nav_courses">المواد</span>
                </button>
                <button class="nav-item" onclick="switchTab('tab-profile', this)" id="nav-profile">
                    <i class="fas fa-user-circle"></i>
                    <span data-i18n="nav_profile">حسابي</span>
                </button>
                <button class="nav-item logout-nav" onclick="doLogout()">
                    <i class="fas fa-sign-out-alt"></i>
                    <span data-i18n="logout">خروج</span>
                </button>
            </nav>
        </div>

        <!-- ============ SECURE PDF VIEWER ============ -->
        <div id="screen-pdf" class="screen">
            <header class="app-header pdf-header">
                <div class="header-content">
                    <button class="back-btn" onclick="closePdfViewer()">
                        <i class="fas fa-arrow-right"></i>
                    </button>
                    <h3 id="pdf-title">عرض الملف</h3>
                    <div class="security-badge">
                        <i class="fas fa-shield-alt"></i>
                        <span data-i18n="secured">محمي</span>
                    </div>
                </div>
            </header>
            <div class="pdf-viewer-container">
                <!-- Watermark overlay -->
                <div class="watermark-overlay" id="watermark-overlay"></div>
                <iframe id="pdf-frame" class="pdf-frame"></iframe>
                <!-- Anti-screenshot overlay -->
                <div class="anti-screenshot-overlay" id="anti-screenshot"></div>
            </div>
        </div>

        <!-- ============ PROFILE SCREEN ============ -->
        <div id="screen-profile" class="screen">
            <header class="app-header">
                <div class="header-content">
                    <button class="back-btn" onclick="showScreen('screen-main')">
                        <i class="fas fa-arrow-right"></i>
                    </button>
                    <h3 data-i18n="profile_title">الملف الشخصي</h3>
                    <div></div>
                </div>
            </header>
            <div class="profile-page" id="profile-page"></div>
        </div>

    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay" style="display:none;">
        <div class="loading-spinner">
            <div class="spinner"></div>
            <p data-i18n="loading">جاري التحميل...</p>
        </div>
    </div>

    <script src="/static/mobile_app/app.js"></script>
</body>

</html>
