name: Build El-Dahih Pro APK

on:
  push:
    branches: [ "main" ]
    paths:
      - 'el_dahih_pro_app/**'
      - '.github/workflows/android_build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: kivy/buildozer:latest

    steps:
    - uses: actions/checkout@v4

    - name: Build with Buildozer
      run: |
        cd el_dahih_pro_app
        # Buildozer is pre-installed in this image
        yes | buildozer -v android debug
      env:
        BUILDOZER_ALLOW_ORG_KIVY_ANDROID_PYTHONACTIVITY: 1
        BUILDOZER_WARN_ON_ROOT: 0

    - name: Upload APK
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: el-dahih-pro-apk
        path: |
          el_dahih_pro_app/bin/*.apk
          el_dahih_pro_app/.buildozer/android/platform/build-*/build/logs/*.log
